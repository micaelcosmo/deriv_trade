<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Bot Deriv</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        h1 { color: #bb86fc; }
        .container { display: flex; flex-direction: column; gap: 20px; }
        .card { background-color: #1e1e1e; border-radius: 8px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        #chart-container { width: 100%; height: 400px; }
        #logs-container { max-height: 400px; overflow-y: auto; background-color: #252525; padding: 15px; border-radius: 4px; font-family: 'Courier New', Courier, monospace; font-size: 0.9em; }
        #logs-container div { padding: 2px 0; border-bottom: 1px solid #333; }
        .log-INFO { color: #a5d6a7; }
        .log-WARNING { color: #ffe082; }
        .log-ERROR { color: #ef9a9a; }
        .log-CRITICAL { color: #f44336; font-weight: bold; }
        button { background-color: #6200ee; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; transition: background-color 0.3s; }
        button:hover { background-color: #3700b3; }
    </style>
    <!-- Lightweight Charts library -->
    <script src="https://unpkg.com/lightweight-charts@4.0.0/dist/lightweight-charts.standalone.production.js"></script>
    <!-- Socket.IO client library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Painel de Controle - Bot Deriv</h1>
            <p>Clique no botão para iniciar uma única execução do bot. Os logs e o gráfico serão atualizados em tempo real.</p>
            <button id="start-bot-btn">▶ Iniciar Bot</button>
        </div>

        <div class="card">
            <h2>Gráfico de Velas</h2>
            <div id="chart-container"></div>
        </div>

        <div class="card">
            <h2>Logs em Tempo Real</h2>
            <div id="logs-container"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const socket = io();
            const logsContainer = document.getElementById('logs-container');
            const startButton = document.getElementById('start-bot-btn');
            
            // --- Chart Setup ---
            const chartContainer = document.getElementById('chart-container');
            let chart, candleSeries;
            
            // Initialize chart with proper library check
            function initChart() {
                if (typeof LightweightCharts === 'undefined') {
                    console.error('LightweightCharts library not loaded');
                    setTimeout(initChart, 500);
                    return;
                }
                
                chart = LightweightCharts.createChart(chartContainer, {
                    width: chartContainer.clientWidth,
                    height: 400,
                    layout: {
                        backgroundColor: '#1e1e1e',
                        textColor: '#e0e0e0',
                    },
                    grid: {
                        vertLines: { color: '#333' },
                        horzLines: { color: '#333' },
                    },
                    timeScale: {
                        timeVisible: true,
                        secondsVisible: false,
                    }
                });
                candleSeries = chart.addCandlestickSeries({
                    upColor: '#26a69a',
                    downColor: '#ef5350',
                    borderDownColor: '#ef5350',
                    borderUpColor: '#26a69a',
                    wickDownColor: '#ef5350',
                    wickUpColor: '#26a69a',
                });
            }
            
            initChart();

            // --- Socket.IO Event Handlers ---
            socket.on('connect', () => {
                console.log('Conectado ao servidor do painel!');
            });

            socket.on('log_message', (msg) => {
                const logLine = document.createElement('div');
                const logText = msg.data;
                logLine.textContent = logText;

                // Add color based on log level
                if (logText.includes(' INFO ')) logLine.className = 'log-INFO';
                else if (logText.includes(' WARNING ')) logLine.className = 'log-WARNING';
                else if (logText.includes(' ERROR ')) logLine.className = 'log-ERROR';
                else if (logText.includes(' CRITICAL ')) logLine.className = 'log-CRITICAL';

                logsContainer.appendChild(logLine);
                logsContainer.scrollTop = logsContainer.scrollHeight; // Auto-scroll
            });

            socket.on('chart_data', (data) => {
                console.log('Recebido dados do gráfico:', data);
                if (!candleSeries) {
                    console.warn('Chart not yet initialized');
                    return;
                }
                // API data: {epoch, open, high, low, close}
                // Chart needs: {time, open, high, low, close}
                const formattedData = data.map(candle => ({
                    time: candle.epoch,
                    open: parseFloat(candle.open),
                    high: parseFloat(candle.high),
                    low: parseFloat(candle.low),
                    close: parseFloat(candle.close),
                }));
                candleSeries.setData(formattedData);
                chart.timeScale().fitContent(); // Adjust view to fit all data
            });

            // --- User Interaction ---
            startButton.addEventListener('click', () => {
                logsContainer.innerHTML = ''; // Clear previous logs
                candleSeries.setData([]); // Clear previous chart
                socket.emit('start_bot');
                startButton.disabled = true;
                startButton.textContent = 'Bot em execução...';
                // Re-enable button after a delay to prevent spamming
                setTimeout(() => {
                    startButton.disabled = false;
                    startButton.textContent = '▶ Iniciar Bot Novamente';
                }, 10000); // 10 seconds cooldown
            });

            // Handle window resize
            new ResizeObserver(entries => {
                if (entries.length === 0 || entries[0].target !== chartContainer) { return; }
                const newRect = entries[0].contentRect;
                chart.applyOptions({ width: newRect.width });
            }).observe(chartContainer);
        });
    </script>
</body>
</html>
